# ── Render.com deployment ──────────────────────────────────────────────────────
services:

  - type: web
    name: kasa-health-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: KHAYA_ASR_KEY
        sync: false
      - key: KHAYA_TTS_KEY
        sync: false
      - key: KHAYA_TRANSLATE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false

  - type: web
    name: kasa-health-frontend
    runtime: python
    plan: free
    rootDir: frontend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: FASTAPI_URL
        value: https://kasa-health-backend.onrender.com
